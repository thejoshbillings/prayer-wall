<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prayer Wall</title>
<link href="https://fonts.googleapis.com/css2?family=Cabin:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #ee7624;
    --orange-light: #f5a062;
    --yellow: #F5C518;
    --bg: #1e1e1e;
    --bg-mid: #2a2a2a;
    --bg-light: #333333;
    --text: #f0f0f0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'Lato', sans-serif;
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(238,118,36,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(238,118,36,0.04) 0%, transparent 50%);
  }

  header {
    text-align: center;
    padding: 2.5rem 1rem 1.5rem;
    border-bottom: 1px solid rgba(238,118,36,0.25);
  }

  #logo {
    width: 60px; height: 60px; margin-bottom: 0.5rem;
    filter: brightness(0) saturate(100%) invert(52%) sepia(73%) saturate(1200%) hue-rotate(1deg) brightness(100%) contrast(97%);
    animation: glow 3s ease-in-out infinite;
  }

  @keyframes glow {
    0%, 100% { filter: brightness(0) saturate(100%) invert(52%) sepia(73%) saturate(1200%) hue-rotate(1deg) brightness(100%) contrast(97%) drop-shadow(0 0 4px rgba(238,118,36,0.4)); }
    50%       { filter: brightness(0) saturate(100%) invert(52%) sepia(73%) saturate(1200%) hue-rotate(1deg) brightness(100%) contrast(97%) drop-shadow(0 0 12px rgba(238,118,36,0.9)); }
  }

  h1 { font-family: 'Cabin', sans-serif; font-size: clamp(1.4rem, 4vw, 2rem); color: var(--orange); letter-spacing: 0.08em; font-weight: 700; }
  .subtitle { font-size: 0.8rem; color: rgba(255,255,255,0.35); letter-spacing: 0.15em; text-transform: uppercase; margin-top: 0.3rem; }
  .last-updated { font-size: 0.72rem; color: rgba(255,255,255,0.25); margin-top: 0.4rem; }

  .wall-links { display: flex; justify-content: center; gap: 1rem; margin-top: 0.75rem; flex-wrap: wrap; }

  .wall-link {
    font-size: 0.78rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 0.3rem 0.9rem; border-radius: 20px; transition: background 0.2s, color 0.2s;
    background: none; cursor: pointer; font-family: 'Lato', sans-serif;
  }

  .wall-link.mens   { color: #4A90D9; border: 1px solid rgba(74,144,217,0.4); }
  .wall-link.mens:hover   { background: #4A90D9; color: #fff; }
  .wall-link.womens { color: #C2699D; border: 1px solid rgba(194,105,157,0.4); }
  .wall-link.womens:hover { background: #C2699D; color: #fff; }

  main { max-width: 960px; margin: 0 auto; padding: 2rem 1.2rem 3rem; }

  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 2.2rem; }

  .stat-card {
    background: var(--bg-mid); border: 1px solid rgba(238,118,36,0.2); border-radius: 10px;
    padding: 1.2rem 1rem; text-align: center; transition: transform 0.2s, border-color 0.2s;
    animation: fadeUp 0.5s ease both; cursor: pointer;
  }

  .stat-card:hover { transform: translateY(-3px); border-color: rgba(238,118,36,0.5); }
  .stat-card.active-filter { border-color: var(--orange); box-shadow: 0 0 0 1px var(--orange); }
  .stat-card:nth-child(1) { animation-delay: 0.05s; }
  .stat-card:nth-child(2) { animation-delay: 0.1s; }
  .stat-card:nth-child(3) { animation-delay: 0.15s; }
  .stat-card:nth-child(4) { animation-delay: 0.2s; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  .stat-number { font-family: 'Cabin', sans-serif; font-size: 2.4rem; font-weight: 700; line-height: 1; margin-bottom: 0.4rem; }
  .stat-label  { font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.4); }

  .stat-card.s-active   .stat-number { color: #6BB8F0; }
  .stat-card.s-answered .stat-number { color: var(--orange); }
  .stat-card.s-praise   .stat-number { color: #F5C518; }
  .stat-card.s-total    .stat-number { color: var(--text); }

  .section { margin-bottom: 2rem; animation: fadeUp 0.6s ease 0.25s both; }

  .collapsible-header { display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; padding-bottom: 0.5rem; border-bottom: 1px solid rgba(238,118,36,0.2); }
  .collapsible-title { font-family: 'Cabin', sans-serif; font-size: 0.85rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--orange); display: flex; align-items: center; gap: 0.5rem; }
  .chevron { color: var(--orange); font-size: 0.9rem; transition: transform 0.3s ease; }
  .chevron.open { transform: rotate(180deg); }
  .collapsible-body { max-height: 0; overflow: hidden; transition: max-height 0.4s ease, padding 0.3s ease; }
  .collapsible-body.open { max-height: 9999px; padding-top: 1rem; }

  .filter-bar { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }

  .filter-pill { font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 700; padding: 0.3rem 0.9rem; border-radius: 20px; border: 1px solid rgba(255,255,255,0.15); background: transparent; color: rgba(255,255,255,0.45); cursor: pointer; transition: all 0.2s; }
  .filter-pill:hover { border-color: var(--orange); color: var(--orange); }
  .filter-pill.pf-All.active-filter      { background: var(--orange); border-color: var(--orange); color: #fff; }
  .filter-pill.pf-Active.active-filter   { background: #6BB8F0; border-color: #6BB8F0; color: #1e1e1e; }
  .filter-pill.pf-Answered.active-filter { background: var(--orange); border-color: var(--orange); color: #fff; }
  .filter-pill.pf-Praise.active-filter   { background: #F5C518; border-color: #F5C518; color: #1e1e1e; }

  .results-count { font-size: 0.72rem; color: rgba(255,255,255,0.3); margin-bottom: 0.75rem; }

  .request-card { background: var(--bg-mid); border: 1px solid rgba(255,255,255,0.06); border-left: 3px solid var(--orange); border-radius: 0 8px 8px 0; padding: 1rem 1.1rem; margin-bottom: 0.75rem; transition: background 0.2s; }
  .request-card:hover    { background: var(--bg-light); }
  .request-card.Answered { border-left-color: var(--orange); }
  .request-card.Active   { border-left-color: #6BB8F0; }
  .request-card.Praise   { border-left-color: #F5C518; }

  .req-top    { display: flex; justify-content: space-between; align-items: flex-start; gap: 0.5rem; margin-bottom: 0.35rem; }
  .req-name   { font-weight: 700; font-size: 0.9rem; color: var(--text); }
  .req-date   { font-size: 0.72rem; color: rgba(255,255,255,0.3); white-space: nowrap; }
  .req-text   { font-size: 0.85rem; color: rgba(255,255,255,0.6); line-height: 1.5; }
  .req-update { margin-top: 0.4rem; font-size: 0.78rem; color: var(--orange-light); font-style: italic; }

  .badge { font-size: 0.65rem; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.2rem 0.55rem; border-radius: 20px; font-weight: 700; white-space: nowrap; }
  .badge.Active   { background: rgba(107,184,240,0.15); color: #6BB8F0; }
  .badge.Answered { background: rgba(238,118,36,0.15);  color: var(--orange); }
  .badge.Praise   { background: rgba(245,197,24,0.15);  color: #F5C518; }
  .badge.unknown  { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.4); }

  .section-title { font-family: 'Cabin', sans-serif; font-size: 0.85rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--orange); padding-bottom: 0.5rem; border-bottom: 1px solid rgba(238,118,36,0.2); display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; }

  .timeline-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 1rem; }
  .timeline-card { background: var(--bg-mid); border: 1px solid rgba(238,118,36,0.2); border-radius: 10px; padding: 1.1rem 1rem; text-align: center; transition: transform 0.2s, border-color 0.2s; }
  .timeline-card:hover { transform: translateY(-3px); border-color: var(--orange); }
  .timeline-number { font-family: 'Cabin', sans-serif; font-size: 2.4rem; font-weight: 700; color: var(--orange); line-height: 1; margin-bottom: 0.4rem; }
  .timeline-month  { font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.4); }

  .pray-btn { display: inline-block; margin-top: 0.75rem; font-size: 0.78rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--orange); border: 1px solid rgba(238,118,36,0.4); border-radius: 20px; padding: 0.3rem 0.9rem; text-decoration: none; transition: background 0.2s, color 0.2s; }
  .pray-btn:hover { background: var(--orange); color: #fff; }

  .empty   { text-align: center; color: rgba(255,255,255,0.2); font-size: 0.85rem; padding: 1.5rem; font-style: italic; }
  .loading { text-align: center; color: var(--orange); padding: 3rem; font-family: 'Cabin', sans-serif; letter-spacing: 0.1em; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
</style>
</head>
<body>

<header>
  <img id="logo" src="https://media.twocitieschurch.net/wp-content/uploads/2024/03/05113835/tcc-arrows.svg" alt="Two Cities Church">
  <h1>Prayer Wall</h1>
  <p class="subtitle">Jones Community Group</p>
  <p class="last-updated" id="lastUpdated"></p>
  <div class="wall-links">
    <button class="wall-link mens"   onclick="window.location.href='mens.html'">Men's Prayer Wall</button>
    <button class="wall-link womens" onclick="window.location.href='womens.html'">Women's Prayer Wall</button>
  </div>
</header>

<main>
  <div id="content"><div class="loading">Loading prayers...</div></div>
</main>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbylKOWK9hvExqfey5JCTuKaUwP51_XuAZKeLQY1eS0/exec";

  function jsonp(url, callbackName, onSuccess, onError) {
  window[callbackName] = function(data) {
    delete window[callbackName];
    const el = document.getElementById('jsonp-' + callbackName);
    if (el) el.remove();
    onSuccess(data);
  };
  const script = document.createElement('script');
  script.id = 'jsonp-' + callbackName;
  script.src = url + "&callback=" + callbackName;
  script.onerror = function() {
    delete window[callbackName];
    script.remove();
    if (onError) onError();
  };
  document.body.appendChild(script);
}

  
  let allRequests = [];
  let activeFilter = "All";
  const knownStatuses = ["Active", "Answered", "Praise"];

  function badgeClass(status) {
    if (!status) return "unknown";
    const match = knownStatuses.find(s => s.toLowerCase() === status.trim().toLowerCase());
    return match || "unknown";
  }

  function requestCard(r) {
    const liveStatus = (r.status || "").trim();
    const cls = badgeClass(liveStatus);
    const smsMessage = encodeURIComponent("Hey " + r.name + ", just wanted you to know I'm praying for you!");
    return `
      <div class="request-card ${cls}">
        <div class="req-top">
          <span class="req-name">${r.name}</span>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.3rem">
            <span class="badge ${cls}">${liveStatus}</span>
            <span class="req-date">Added: ${r.date}</span>
          </div>
        </div>
        <p class="req-text">${r.request}</p>
        ${r.updates ? `<p class="req-update">↳ ${r.updates}</p>` : ''}
        <a class="pray-btn" href="sms:?body=${smsMessage}">🙏 Let them know you're praying</a>
      </div>`;
  }

  function applyFilter(filter) {
    activeFilter = filter;
    document.querySelectorAll('.stat-card').forEach(c =>
      c.classList.toggle('active-filter', c.dataset.filter === filter));
    document.querySelectorAll('.filter-pill').forEach(p =>
      p.classList.toggle('active-filter', p.dataset.filter === filter));
    const filtered = filter === "All" ? allRequests : allRequests.filter(r => badgeClass(r.status) === filter);
    const countEl = document.getElementById('results-count');
    const listEl  = document.getElementById('all-requests-list');
    if (!countEl || !listEl) return;
    countEl.textContent = filtered.length + " request" + (filtered.length !== 1 ? "s" : "");
    listEl.innerHTML = filtered.length ? filtered.map(requestCard).join('') : '<p class="empty">No requests match this filter.</p>';
  }

  function toggleCollapsible() {
    document.getElementById('collapsible-body').classList.toggle('open');
    document.getElementById('chevron').classList.toggle('open');
  }

  function render(d) {
    const now = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    document.getElementById('lastUpdated').textContent = 'Last updated: ' + now;
    allRequests = d.all;

    const timelineHTML = d.timeline.length ? `
      <div class="timeline-grid">
        ${d.timeline.map(t => `
          <div class="timeline-card">
            <div class="timeline-number">${t.count}</div>
            <div class="timeline-month">${t.month}</div>
          </div>`).join('')}
      </div>` : '<p class="empty">No answered prayers logged yet.</p>';

    document.getElementById('content').innerHTML = `
      <div class="stats-grid">
        <div class="stat-card s-total" data-filter="All" onclick="applyFilter('All')">
          <div class="stat-number">${d.total}</div>
          <div class="stat-label">Total Requests</div>
        </div>
        <div class="stat-card s-active" data-filter="Active" onclick="applyFilter('Active')">
          <div class="stat-number">${d.active}</div>
          <div class="stat-label">Active</div>
        </div>
        <div class="stat-card s-answered" data-filter="Answered" onclick="applyFilter('Answered')">
          <div class="stat-number">${d.answered}</div>
          <div class="stat-label">Answered</div>
        </div>
        <div class="stat-card s-praise" data-filter="Praise" onclick="applyFilter('Praise')">
          <div class="stat-number">${d.praise}</div>
          <div class="stat-label">Praise</div>
        </div>
      </div>

      <div class="section">
        <div class="collapsible-header" onclick="toggleCollapsible()">
          <div class="collapsible-title">📋 All Requests (${d.total})</div>
          <span class="chevron open" id="chevron">▼</span>
        </div>
        <div class="collapsible-body open" id="collapsible-body">
          <div class="filter-bar">
            <button class="filter-pill pf-All"      data-filter="All"      onclick="applyFilter('All')">All</button>
            <button class="filter-pill pf-Active"   data-filter="Active"   onclick="applyFilter('Active')">Active</button>
            <button class="filter-pill pf-Answered" data-filter="Answered" onclick="applyFilter('Answered')">Answered</button>
            <button class="filter-pill pf-Praise"   data-filter="Praise"   onclick="applyFilter('Praise')">Praise</button>
          </div>
          <div class="results-count" id="results-count"></div>
          <div id="all-requests-list"></div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">📅 Answered Prayers by Month</div>
        ${timelineHTML}
      </div>`;

    applyFilter(activeFilter);
  }

//   function handleData(d) {
//   render(d);
// }

function load() {
  fetch("https://corsproxy.io/?" + encodeURIComponent(SCRIPT_URL + "?action=data"))
    .then(r => r.json())
    .then(render)
    .catch(() => {
      document.getElementById('content').innerHTML =
        '<p class="empty">Could not load data. Please try again.</p>';
    });
}

load();
setInterval(load, 30000);
</script>
</body>
</html>
